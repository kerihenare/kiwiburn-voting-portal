name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: kiwiburn
          POSTGRES_PASSWORD: kiwiburn
          POSTGRES_DB: voting_portal
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: npx playwright install chromium --with-deps

      - name: Set up E2E environment
        run: |
          cat > .env.test <<'EOF'
          DATABASE_URL=postgresql://kiwiburn:kiwiburn@localhost:5432/voting_portal_test
          BETTER_AUTH_SECRET=test-secret-for-e2e-tests
          BETTER_AUTH_URL=http://localhost:3001
          NEXT_PUBLIC_BETTER_AUTH_URL=http://localhost:3001
          SMTP_HOST=localhost
          SMTP_PORT=1025
          SMTP_USER=test
          SMTP_PASS=test
          SMTP_FROM=test@kiwiburn.com
          EOF
          sed -i 's/^[[:space:]]*//' .env.test

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
